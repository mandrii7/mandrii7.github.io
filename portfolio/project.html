<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrii Mandra - Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: rgb(255, 255, 255);
            color: #333;
            font-family: 'Open Sans', sans-serif;
            text-align: center;
            padding: 0;
            margin: 0;
            line-height: 1.8;
        }

        h1, .top-tab, .bottom-tab {
            background-image: url('images/tab.jpg');
            color: #333;
            font-size: 2em;
            margin: 0;
            padding: 80px 0;
            width: 100vw;
            position: absolute;
            left: 0;
            background-size: cover;
            background-position: center;
        }

        h1 {
            top: 0;
            border-bottom-left-radius: 250px;
            border-bottom-right-radius: 250px;
        }

        .top-tab {
            bottom: 0;
            padding: 100px 0;
            border-top-left-radius: 250px;
            border-top-right-radius: 250px;
        }

        .bottom-tab {
            bottom: -1950px;
            padding: 620px 0 50px 0; 
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            border-top-left-radius: 250px;
            border-top-right-radius: 250px;
        }

        .logo, .bottom-logo {
            transition: transform 0.3s ease;
            position: absolute;
            top: 35px;
            left: 50px;
            width: 180px;
            height: auto;
        }

        .bottom-logo {
            position: absolute;
            top: 70px;
            left: 255px;
            width: 220px;
            height: auto;
        }

        .logo:hover {
            transform: scale(1.1);
        }

        .bottom-logo:hover {
            transform: scale(0.95);
        }

        .top-right-text {
            position: absolute;
            top: 70px;
            right: 100px;
            font-family: 'Open Sans', sans-serif;
            color: rgb(240, 240, 240);
        }

        .nav-item {
            margin-left: 60px;
            display: inline;
            font-size: 18px;
        }

        .nav-item:hover {
            color: rgb(38, 38, 38);
        }

        .bottom-tab span, .bottom-tab p {
            position: absolute;
            top: 635px;
            left: 50%;
            transform: translateX(-50%);
            color: rgb(167, 166, 166);
            font-size: 17px;
        }

        .bottom-tab p {
            top: 65px; 
            left: 70%;
            color: rgb(240, 240, 240);
            font-size: 18px;
            width: 30%; 
            text-align: center;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 5px rgba(167, 166, 166, 0);
            }
            to {
                text-shadow: 0 0 10px rgba(167, 166, 166, 0.7), 0 0 20px rgba(167, 166, 166, 0.5);
            }
        }


        .frame-container {
            position: relative;
            left: 210px;
            top: 225px;
            width: 110%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .project-frame {
            transition: transform 0.3s ease;
            border: 2px solid rgb(50, 129, 85);
            border-radius: 20px;
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.1);
            width: 40%;
            height: 400px;
            margin: 40px;
            display: inline-block;
            background-size: cover;
            background-position: center;
        }

        .project-frame:hover {
            transform: scale(1.03);
        }
        .collaboration-text {
            font-size: 28px;
            color: rgb(38, 38, 38);
            position: absolute;
            width: 100%;
            left: 0;
            bottom: 350px;
            font-weight: bold;
        }

        .contact-info {
            font-size: 20px;
            color: rgb(240, 240, 240);
            position: absolute;
            width: 100%;
            left: 0;
            bottom: 250px;
            animation: glow 2s infinite alternate;
        }

        .separator-line {
            position: absolute;
            width: 80%;
            height: 1px;
            background-color: rgb(240, 240, 240);
            left: 10%;
            bottom: 450px;
        }
    </style>
</head>
<body>
    <h1><a href="#"><img src="images/logo.pdf" class="logo" alt="Logo" onclick="window.location.href='index.html';"></a></h1>
    <div class="top-right-text">
        <span class="nav-item">Work</span>
        <span class="nav-item">About</span>
        <span class="nav-item">Contact</span>
    </div>
    </div>
    <div class="bottom-tab">
        <a href="#" onclick="window.location.href='index.html';" ><img src="images/logo.pdf" class="bottom-logo" alt="Logo"></a>
        <span>Copyright © 2024 Andrii Mandra</span>
        <p>I am dedicated to crafting user-centric digital experiences that seamlessly blend aesthetic appeal with functionality.</p>
        <div class="separator-line"></div>
        <div class="collaboration-text">Let's work together</div>
        <div class="contact-info">andriimandra7@gmail.com</div>
        <div class="contact-info" style="bottom: 140px;">+1 (437) 974-5737</div>
    </div>
</body>
</html>
